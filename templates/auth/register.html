{% extends "base.html" %}

{% block title %}注册 - {{ site_name }}{% endblock %}

{% block body %}
<div class="min-h-[calc(100vh-7rem)] bg-gray-50 flex flex-col justify-center px-4 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center">
            <span class="text-3xl font-extrabold text-indigo-600 flex items-center gap-2">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                {{ site_name }}
            </span>
        </div>
        <p class="mt-2 text-center text-sm text-gray-500">{{ site_subtitle }}</p>
        <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">
            注册新账户
        </h2>
    </div>

    <div class="mt-4 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-200">
            
            {% if error %}
            <div class="mb-4 bg-red-50 border-l-4 border-red-400 p-4 rounded shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700 font-medium">
                            {{ error }}
                        </p>
                    </div>
                </div>
            </div>
            {% endif %}

            <form class="space-y-6" action="/web/register" method="POST">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">
                        电子邮箱
                    </label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" autocomplete="email" required placeholder="请输入邮箱地址" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        密码
                    </label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" autocomplete="new-password" required placeholder="请输入密码（至少 6 位）" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150">
                        注册
                    </button>
                </div>
            </form>
            <p class="text-center text-sm text-gray-600 mt-4">
                已经有账户？
                <a href="/web/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition duration-150">
                    立即登录
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
